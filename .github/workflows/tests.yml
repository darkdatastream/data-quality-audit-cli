name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package with app and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,app]"

      - name: Compile Python files
        run: python -m py_compile app.py dq_audit/*.py

      - name: Run tests
        run: pytest -q
